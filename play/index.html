<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play App // DAXINI.SPACE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090d;
      --nav-bg: rgba(11, 14, 23, 0.92);
      --border: #232a3f;
      --text: #eef2ff;
      --muted: #9aa6cb;
      --accent: #7aa2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .top-nav {
      height: 62px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 20;
    }

    .brand {
      font-size: clamp(0.84rem, 0.76rem + 0.35vw, 1rem);
      letter-spacing: 0.06em;
      color: var(--text);
      font-weight: 600;
      margin-right: 10px;
    }

    .cta {
      text-decoration: none;
      color: var(--text);
      background: #151c2f;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.86rem;
      font-weight: 500;
      white-space: nowrap;
    }

    .cta:hover {
      border-color: var(--accent);
    }

    .frame-wrap {
      margin-top: 62px;
      height: calc(100vh - 62px);
      width: 100%;
    }

    #app-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #020307;
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="brand">DAXINI.SPACE // APP STORE</div>
    <a class="cta" href="https://logichub.app" target="_blank" rel="noopener noreferrer">Build your own on LogicHub</a>
  </header>

  <main class="frame-wrap">
    <iframe id="app-frame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
  </main>

  <script>
    function sanitizeId(raw) {
      const value = String(raw ?? '').trim();
      return value.match(/^[a-zA-Z0-9_-]+$/) ? value : '';
    }

    const params = new URLSearchParams(window.location.search);
    const safeId = sanitizeId(params.get('id'));
    const frame = document.getElementById('app-frame');

    frame.src = safeId
      ? `https://logichub.app/tools/${encodeURIComponent(safeId)}`
      : 'https://logichub.app/explore';
  </script>
  <script src="/app/router.js"></script>
  <script src="/app/auth.js"></script>
  <script src="/app/ui.js"></script>
  <script src="/app/bootstrap.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Daxini.space — Premium Pattern OS</title>
  <meta name="description" content="Daxini.space is a sovereign pattern-based OS for app discovery.">
  <link rel="stylesheet" href="os-core.css">
</head>
<body>

  <!-- STARFIELD -->
  <div id="starfield"></div>

  <!-- IDENTITY HUD -->
  <div id="identity-hud"></div>

  <!-- SOVEREIGN AUTH OVERLAY -->
  <div id="zv-auth-overlay" class="zv-auth-overlay hidden">
    <div class="zv-auth-modal">
      <div class="zv-auth-icon">🛡️</div>
      <h2 class="zv-auth-title">Sovereign Authorization</h2>
      <p class="zv-auth-desc">Access to the Daxini Pattern OS requires a verified Sovereign Passport. Please enter your hardware ID to authorize this session.</p>
      <form id="zv-auth-form" class="zv-auth-form">
        <div class="zv-auth-group">
          <label>PHYSICAL PASSPORT ID</label>
          <input type="text" id="zv-nfc-input" placeholder="Enter Hardware ID..." required>
        </div>
        <button type="submit" class="zv-auth-btn">Authorize Hardware</button>
        <div id="zv-auth-status" class="zv-auth-status"></div>
      </form>
    </div>
  </div>

  <!-- WINDOW MANAGER -->
  <div id="window-manager"></div>

  <!-- FRACTAL DESKTOP -->
  <div id="room-environment">
    <div class="room-node-app" id="node-0"></div>
    <div class="room-node-app" id="node-1"></div>
    <div class="room-node-app" id="node-2"></div>
    <div class="room-node-app" id="node-3"></div>
    <div class="room-node-app" id="node-5"></div>
    <div class="room-node-app" id="node-6"></div>
    <div class="room-node-app" id="node-7"></div>
    <div class="room-node-app" id="node-8"></div>

    <div id="room-center">
      <h1 id="room-title">DAXINI.SPACE</h1>
    </div>
  </div>

  <!-- THUMB ZONE MATRIX -->
  <div id="os-minimap">
    <svg id="grid-svg"><polyline id="trace-line" points=""/></svg>
    <div id="os-action-hint"></div>
    <div id="dots-container">
      <div class="dot-cell" data-idx="0"><div class="dot" id="dot-0"></div></div>
      <div class="dot-cell" data-idx="1"><div class="dot" id="dot-1"></div></div>
      <div class="dot-cell" data-idx="2"><div class="dot" id="dot-2"></div></div>
      <div class="dot-cell" data-idx="3"><div class="dot" id="dot-3"></div></div>
      <div class="dot-cell" data-idx="4"><div class="dot center-dot" id="dot-4"></div></div>
      <div class="dot-cell" data-idx="5"><div class="dot" id="dot-5"></div></div>
      <div class="dot-cell" data-idx="6"><div class="dot" id="dot-6"></div></div>
      <div class="dot-cell" data-idx="7"><div class="dot" id="dot-7"></div></div>
      <div class="dot-cell" data-idx="8"><div class="dot" id="dot-8"></div></div>
    </div>
    <div class="minimap-hint">swipe or tap to launch</div>
  </div>

  <!-- MODULAR CORE -->
  <script src="daxini-registry.js"></script>
  <script src="daxini-passport.js"></script>
  <script src="pattern-tracer.js"></script>
  <script src="os-shell.js"></script>
  <script src="daxini-ui.js"></script>

  <script>
    // Starfield initializer (one-off)
    (function() {
      const sf = document.getElementById('starfield');
      for (let i = 0; i < 60; i++) {
        const star = document.createElement('div');
        star.style.cssText = `position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:${Math.random()};`;
        sf.appendChild(star);
      }
    })();

    // Helper to route logs to spatial-engine's diagnostics
    window.logDiag = function(action, message) {
        if (window.OS && window.OS.updateDiagnostics) {
            window.OS.updateDiagnostics('ZAYVORA', action, message);
        } else {
            console.log(`[${action}] ${message}`);
        }
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DAXINI SPACE // Spatial OS</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ff671f">
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #030508;
      --matrix-green: #00e5ff; /* Shifted to Daxini Cyan */
      --saffron: #ff671f;
      --glass-bg: rgba(10, 12, 18, 0.75);
      --glass-border: rgba(0, 229, 255, 0.2);
      --font-mono: 'JetBrains Mono', monospace;
      --font-display: 'Syne', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    body { background-color: var(--bg); color: #fff; font-family: var(--font-mono); overflow: hidden; touch-action: none; }

    /* DIAGNOSTICS */
    #os-diagnostics {
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.85); color: var(--matrix-green);
      font-size: 10px; padding: max(env(safe-area-inset-top), 10px) 10px 10px;
      z-index: 100000; border-bottom: 1px solid var(--matrix-green);
      pointer-events: none; display: none;
    }
    .diag-log { margin-bottom: 4px; }
    .diag-time { color: #555; margin-right: 8px; }

    /* FRACTAL ROOM ENVIRONMENT - VISUAL GRID */
    #room-environment {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s;
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.03) 0%, transparent 60%);
    }
    
    #room-center { text-align: center; pointer-events: none; z-index: 2; }
    #room-title { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-transform: uppercase; text-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }
    #room-lore { font-size: 11px; color: #888; max-width: 250px; line-height: 1.5; margin: 0 auto; }
    
    /* UPGRADED: App Nodes (Glowing Cards instead of text) */
    .room-node-app {
      position: absolute; width: 90px; height: 90px;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 8px; cursor: pointer; pointer-events: auto;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    
    .room-node-app:hover, .room-node-app:active {
      border-color: var(--matrix-green); transform: scale(1.1);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }

    .app-icon { font-size: 24px; margin-bottom: 6px; }
    .app-name { font-size: 9px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Fixed Spatial Positioning (Matches the 3x3 thumb matrix) */
    #node-0 { top: 15%; left: 10%; }
    #node-1 { top: 10%; left: 50%; transform: translateX(-50%); }
    #node-2 { top: 15%; right: 10%; }
    #node-3 { top: 40%; left: 5%; }
    #node-5 { top: 40%; right: 5%; }
    #node-6 { bottom: 35%; left: 10%; }
    #node-7 { bottom: 30%; left: 50%; transform: translateX(-50%); }
    #node-8 { bottom: 35%; right: 10%; }

    /* WINDOW MANAGER */
    #window-manager {
      position: fixed; inset: 0; 
      padding: max(env(safe-area-inset-top), 20px) 20px; 
      padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 260px); 
      display: flex; flex-direction: column; justify-content: flex-end; gap: 12px;
      z-index: 50; pointer-events: none;
    }
    
    .glass-window {
      pointer-events: auto; flex: 1; min-height: 0;
      background: var(--bg); border: 1px solid var(--matrix-green); border-radius: 16px;
      display: flex; flex-direction: column; overflow: hidden;
      animation: slideUp 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(0, 229, 255, 0.2);
    }
    
    @keyframes slideUp { from { transform: translateY(100px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    
    .window-header {
      height: 40px; border-bottom: 1px solid rgba(0, 229, 255, 0.2); background: var(--glass-bg);
      display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
    }
    .window-title { font-size: 11px; color: var(--matrix-green); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .window-close { color: #fff; font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; opacity: 0.7; }
    .window-close:active { opacity: 1; color: var(--saffron); }
    .window-content { flex: 1; width: 100%; border: none; background: #fff; }

    /* THUMB ZONE MATRIX (The 3x3 Grid) */
    #os-minimap {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 10px) + 20px);
      left: 50%; transform: translateX(-50%); width: 220px; height: 220px;
      z-index: 9999; touch-action: none;
      background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
    }
    
    #grid-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    #trace-line { fill: none; stroke: var(--matrix-green); stroke-width: 4px; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 8px rgba(0,229,255,0.5)); transition: stroke 0.2s, filter 0.2s; }
    
    #dots-container { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); z-index: 2; }
    .dot-cell { display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: all 0.2s; }
    .dot.active { background: var(--matrix-green); box-shadow: 0 0 15px var(--matrix-green); transform: scale(1.5); }
    .dot.center-dot { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.4); background: transparent; }

    /* SIGIL RECOGNITION FLASH */
    body.sigil-flash #trace-line { stroke: var(--saffron) !important; filter: drop-shadow(0 0 15px var(--saffron)) !important; }
    body.sigil-flash .dot.active { background: var(--saffron) !important; box-shadow: 0 0 15px var(--saffron) !important; }
    body.sigil-flash #room-title { color: var(--saffron); }
  </style>
</head>
<body>

  <div id="os-diagnostics"><div id="diag-content"></div></div>

  <div id="window-manager"></div>

  <div id="room-environment">
    <div class="room-node-app" id="node-0"></div>
    <div class="room-node-app" id="node-1"></div>
    <div class="room-node-app" id="node-2"></div>
    <div class="room-node-app" id="node-3"></div>
    <div class="room-node-app" id="node-5"></div>
    <div class="room-node-app" id="node-6"></div>
    <div class="room-node-app" id="node-7"></div>
    <div class="room-node-app" id="node-8"></div>
    
    <div id="room-center">
      <div id="room-title">DAXINI OS</div>
      <div id="room-lore">Swipe from matrix center to launch, or tap nodes. Tap center to ascend.</div>
    </div>
  </div>

  <div id="os-minimap">
    <svg id="grid-svg"><polyline id="trace-line" points=""/></svg>
    <div id="dots-container">
      <div class="dot-cell"><div class="dot" id="dot-0"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-1"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-2"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-3"></div></div>
      <div class="dot-cell"><div class="dot center-dot" id="dot-4"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-5"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-6"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-7"></div></div>
      <div class="dot-cell"><div class="dot" id="dot-8"></div></div>
    </div>
  </div>

  <script>
    /* 1. DIAGNOSTICS ENGINE */
    const diagEl = document.getElementById('os-diagnostics');
    const diagContent = document.getElementById('diag-content');
    let tapCount = 0;

    document.body.addEventListener('touchstart', (e) => {
      if (e.touches[0].clientX < 60 && e.touches[0].clientY < 60) {
        tapCount++;
        if (tapCount === 3) { diagEl.style.display = diagEl.style.display === 'none' ? 'block' : 'none'; tapCount = 0; }
        setTimeout(() => tapCount = 0, 1500);
      }
    });

    function logDiag(type, msg) {
      const now = new Date().toLocaleTimeString([], {hour12:false});
      const entry = document.createElement('div');
      entry.className = 'diag-log';
      entry.innerHTML = `<span class="diag-time">[${now}]</span> <strong>[${type}]</strong> ${msg}`;
      diagContent.prepend(entry);
      if(diagContent.children.length > 8) diagContent.lastChild.remove();
      console.log(`[OS] ${type}: ${msg}`);
    }

    /* 2. THE DAXINI APP REGISTRY (The Real Apps) */
    const DAXINI_GALAXY = {
      name: "Daxini Space",
      lore: "The master application registry.",
      apps: {
        0: { name: "LogicHub", icon: "ZN", url: "https://logichub.app", type: "engine" },
        1: { name: "ViaDecide", icon: "VD", url: "https://viadecide.com", type: "hub" },
        2: { name: "Alchemist", icon: "CH", url: "https://viadecide.com/alchemist", type: "edu" }, // Update URL when deployed
        3: { name: "SOP Builder", icon: "SP", url: "https://viadecide.com/sop", type: "tool" },
        5: { name: "SkillHex", icon: "HX", url: "https://viadecide.com/skillhex", type: "hr" },
        6: { name: "ViaLogic", icon: "VL", url: "https://viadecide.com/vialogic", type: "game" },
        7: { name: "ViaMath", icon: "VM", url: "https://viadecide.com/viamath", type: "game" },
        8: { name: "Mars Sim", icon: "MS", url: "https://viadecide.com/mars", type: "sim" }
      }
    };

    const MASTER_KEY_SIGIL = "1,4,7,6,3,4,5,2,5,8";

    /* 3. HYBRID RENDER ENGINE */
    function renderRoom() {
      const titleEl = document.getElementById('room-title');
      const loreEl = document.getElementById('room-lore');
      
      titleEl.innerText = DAXINI_GALAXY.name;
      loreEl.innerText = DAXINI_GALAXY.lore;

      // Render the App Cards
      [0,1,2,3,5,6,7,8].forEach(pos => {
        const nodeEl = document.getElementById(`node-${pos}`);
        const appData = DAXINI_GALAXY.apps[pos];
        
        if (appData) {
          nodeEl.style.display = 'flex';
          nodeEl.innerHTML = `
            <div class="app-icon">${appData.icon}</div>
            <div class="app-name">${appData.name}</div>
          `;
          // Direct Click Event (Hybrid Navigation)
          nodeEl.onclick = () => launchApp(pos);
        } else {
          nodeEl.style.display = 'none';
        }
      });
    }

    function animateFractalTransition(targetPos, isRecall) {
      const room = document.getElementById('room-environment');
      const origins = { 0:"top left", 1:"top center", 2:"top right", 3:"center left", 5:"center right", 6:"bottom left", 7:"bottom center", 8:"bottom right" };
      
      room.style.transformOrigin = isRecall ? "center center" : (origins[targetPos] || "center");
      room.style.transform = isRecall ? "scale(0.5)" : "scale(2.5)";
      room.style.opacity = "0";

      setTimeout(() => {
        renderRoom();
        room.style.transition = "none";
        room.style.transform = isRecall ? "scale(2.5)" : "scale(0.5)";
        void room.offsetWidth; // Reflow
        room.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s";
        room.style.transform = "scale(1)";
        room.style.opacity = "1";
      }, 300);
    }

    /* 4. REAL IFRAME WINDOW MANAGER */
    const wm = document.getElementById('window-manager');
    
    function launchApp(posIndex) {
      const appData = DAXINI_GALAXY.apps[posIndex];
      if (!appData) return;
      
      logDiag('LAUNCH', `Booting ${appData.name}`);
      
      // Clear existing windows to keep UI clean on mobile
      wm.innerHTML = '';
      
      const win = document.createElement('div');
      win.className = 'glass-window';
      win.innerHTML = `
        <div class="window-header">
          <span class="window-title">${appData.name}</span>
          <span class="window-close" title="Close App">✕</span>
        </div>
        <iframe class="window-content" src="${appData.url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      `;
      
      win.querySelector('.window-close').addEventListener('click', () => {
        win.remove();
        logDiag('TERMINATE', `Closed ${appData.name}`);
      });
      
      wm.appendChild(win);
    }

    /* 5. PATTERN TRACER */
    const minimap = document.getElementById('os-minimap');
    const svgLine = document.getElementById('trace-line');
    let path = [];
    let isTracing = false;

    function getDotCenter(idx) {
      const dot = document.getElementById(`dot-${idx}`);
      const rect = dot.getBoundingClientRect();
      const mapRect = minimap.getBoundingClientRect();
      return { x: rect.left - mapRect.left + rect.width/2, y: rect.top - mapRect.top + rect.height/2 };
    }

    function drawSVG(touchX, touchY) {
      let pts = path.map(idx => { let c = getDotCenter(idx); return `${c.x},${c.y}`; });
      if(isTracing && touchX !== undefined) pts.push(`${touchX},${touchY}`);
      svgLine.setAttribute('points', pts.join(' '));
    }

    function handleTouch(e) {
      const t = e.touches[0];
      const mapRect = minimap.getBoundingClientRect();
      const x = t.clientX - mapRect.left;
      const y = t.clientY - mapRect.top;
      
      const col = Math.floor((x / mapRect.width) * 3);
      const row = Math.floor((y / mapRect.height) * 3);
      
      if (col >= 0 && col <= 2 && row >= 0 && row <= 2) {
        const idx = row * 3 + col;
        if (path.length === 0 || path[path.length - 1] !== idx) {
          path.push(idx);
          document.getElementById(`dot-${idx}`).classList.add('active');
          if(navigator.vibrate) navigator.vibrate(15);
        }
      }
      drawSVG(x, y);
    }

    minimap.addEventListener('touchstart', e => { e.preventDefault(); isTracing = true; path = []; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); handleTouch(e); });
    minimap.addEventListener('touchmove', e => { e.preventDefault(); if (isTracing) handleTouch(e); });
    minimap.addEventListener('touchend', e => { e.preventDefault(); isTracing = false; drawSVG(); processPattern(); });

    // Desktop Mouse Fallback for the Matrix Engine
    let isMouseDown = false;
    minimap.addEventListener('mousedown', e => { isMouseDown = true; isTracing = true; path = []; document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); handleTouch({touches:[e]}); });
    minimap.addEventListener('mousemove', e => { if (isMouseDown && isTracing) handleTouch({touches:[e]}); });
    window.addEventListener('mouseup', () => { if(isMouseDown){ isMouseDown = false; isTracing = false; drawSVG(); processPattern(); }});

    /* 6. THE ROUTING ENGINE */
    function processPattern() {
      const seed = path.join(',');
      if (!seed) return;

      setTimeout(() => {
        if(!isTracing) {
           svgLine.setAttribute('points', '');
           document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
           document.body.classList.remove('sigil-flash');
        }
      }, 500);

      // MASTER KEY
      if (seed === MASTER_KEY_SIGIL) {
        document.body.classList.add('sigil-flash');
        logDiag('MASTER_SIGIL', 'Cryptographic signature recognized.');
        setTimeout(() => { launchApp(1); }, 300); // Launches ViaDecide as Root
        return;
      }

      // APP LAUNCH SWIPE (Center to Outer Node)
      if (path.length === 2 && path[0] === 4) {
        const target = path[1];
        if (DAXINI_GALAXY.apps[target]) {
          // Visual flare
          animateFractalTransition(target, false);
          // Wait for animation, then open iframe
          setTimeout(() => launchApp(target), 300);
        } else {
          logDiag('ERROR', `Sector ${target} is empty.`);
        }
        return;
      }

      // CLOSE ALL WINDOWS (Tap Center)
      if (path.length === 1 && path[0] === 4) {
        wm.innerHTML = '';
        animateFractalTransition(4, true);
        logDiag('SYSTEM', 'Cleared active viewports.');
        return;
      }
    }

    // Init display
    renderRoom();
    logDiag('SYSTEM', 'Daxini Space OS Online.');

  </script>
</body>
</html>

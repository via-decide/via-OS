<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Daxini Space — Redirecting...</title>
    <script type="text/javascript">
        // SOVEREIGN ROUTER REDIRECT
        // This handles pretty URLs like daxini.space/app/logichub by converting them
        // into parameter-based URLs for the SPA router.
        (function() {
            var path = window.location.pathname;
            var segments = path.split('/').filter(Boolean);
            
            if (segments[0] === 'app' && segments[1]) {
                var slug = segments[1];
                window.location.replace('/?app=' + slug);
            } else {
                window.location.replace('/');
            }
        })();
    </script>
</head>
<body>
    <p>Redirecting to Sovereign Interface...</p>
</body>
</html>
